    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="/static/img/favicon.png" type="image/png">
    <link rel="stylesheet" href="/static/css/styles.css">
    <script>
        (function(){
            var t = localStorage.getItem('newsai-theme');
            var dark = t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches);
            if (dark) document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark');
        })();
    </script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' }
                    }
                }
            }
        };
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 font-sans antialiased transition-colors" data-header-link-logo="true" data-header-show-stats="true">
    <div id="header-container"></div>
    <script src="/static/js/theme.js"></script>
    <script src="/static/js/header.js"></script>
    <script src="/static/js/seo.js"></script>
    <script>renderHeader({ linkLogo: true, showStats: true });</script>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <div class="flex flex-col lg:flex-row gap-6">
            <aside id="filterSidebarContainer" class="lg:w-64 flex-shrink-0"></aside>
            <div class="flex-1 min-w-0">
                <!-- SEO: Nội dung bài viết (H1, breadcrumb, time, nội dung do article.js render) -->
                <div id="articlePageContent">
                    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 p-8 text-center">
                        <p class="text-gray-600 dark:text-gray-400">Đang tải bài viết...</p>
                    </div>
                </div>

                <!-- Bài viết cùng chuyên mục -->
                <section id="relatedSection" class="mt-10 hidden">
                    <h2 class="text-xl font-bold text-gray-900 dark:text-gray-100 mb-4">Bài viết cùng chuyên mục</h2>
                    <div id="relatedArticlesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
                </section>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>
    <script src="/static/js/footer.js"></script>
    <script>renderFooter();</script>

    <script src="/static/js/filter.js"></script>
    <script src="/static/js/article.js"></script>
</body>
</html>
